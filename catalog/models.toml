# Curated model catalog (data, not code). Adding a model = adding a [models.<key>] block.
# Every profile must carry [models.<key>.profile.validation] or it will not load (spec §14).
# The TOML table key avoids dots; the canonical model id is the `id` field.

[models.qwen3-0-6b]
id = "qwen3-0.6b"
hf_repo = "Qwen/Qwen3-0.6B"
family = "qwen3"
parameter_count = "0.6B"
min_gpu_memory_gb = 8
context_window = 32768
license = "apache-2.0"
chat = true
supports_tools = true

[models.qwen3-0-6b.profile]
image = "vllm/vllm-openai:v0.9.1"
tensor_parallel = 1
gpu_memory_utilization = 0.90
recommended_gpu = "RTX-A4000"
min_disk_gb = 20

[models.qwen3-0-6b.profile.validation]
validated_at = "2026-07-03"
validated_provider = "runpod"
validated_gpu = "RTX-A4000"
validated_image = "vllm/vllm-openai:v0.9.1"
startup_timeout_seconds = 600
notes = "Smallest catalog model; the integration-gauntlet target."

