name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"
      - name: Install
        run: uv sync --extra dev
      - name: Lint
        run: uv run ruff check src/ tests/
      - name: Format
        run: uv run ruff format --check src/ tests/
      - name: Test
        # Offline against the mock provider; the RunPod integration path is gated by
        # GPU_ORCH_INTEGRATION (unset here), so CI needs no credentials and spends nothing.
        run: uv run python -m pytest tests/ -q
