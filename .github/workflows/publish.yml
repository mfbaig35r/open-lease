name: Publish

# A version tag publishes to PyPI, e.g.:  git tag v0.1.0 && git push origin v0.1.0
# (tag-push, not a GitHub Release). Bump `version` in pyproject.toml to match the tag first.
on:
  push:
    tags: ["v*"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Build the visual workbench (open-lease-ui) and bundle it into the package so the released
      # wheel serves `gpu ui` out of the box. gpu_orchestrator/web is gitignored (a build output),
      # so it must be produced here. open-lease-ui is a public repo, so a plain checkout works. The
      # UI ref defaults to main; override with an OPEN_LEASE_UI_REF repository variable to pin a tag.
      - name: Check out open-lease-ui
        uses: actions/checkout@v4
        with:
          repository: mfbaig35r/open-lease-ui
          ref: ${{ vars.OPEN_LEASE_UI_REF || 'main' }}
          path: ui-src
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: ui-src/pnpm-lock.yaml
      - name: Build + bundle the UI into gpu_orchestrator/web
        working-directory: ui-src
        run: |
          pnpm install --frozen-lockfile
          pnpm build:embedded   # empty NEXT_PUBLIC_API_URL -> same-origin fetches
          rm -rf ../src/gpu_orchestrator/web
          cp -r out ../src/gpu_orchestrator/web

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"
      - name: Install
        run: uv sync --extra dev
      - name: Lint + format
        run: |
          uv run ruff check src/ tests/
          uv run ruff format --check src/ tests/
      - name: Test (offline, mock provider)
        run: uv run python -m pytest tests/ -q
      - name: Build sdist + wheel
        run: uv build
      - name: Verify the wheel bundled the UI
        run: |
          python -c "import zipfile,glob,sys; w=glob.glob('dist/*.whl')[0]; \
          names=zipfile.ZipFile(w).namelist(); \
          ok=any(n.endswith('gpu_orchestrator/web/index.html') for n in names); \
          print('UI bundled:' if ok else 'MISSING UI in wheel:', w); \
          sys.exit(0 if ok else 1)"
      - name: Check metadata + README render for PyPI
        run: uvx twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # PyPI Trusted Publishing (OIDC): no API token stored anywhere
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
